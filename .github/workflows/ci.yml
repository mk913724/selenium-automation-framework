name: Selenium CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Match ChromeDriver with GitHub Chrome
        run: |
          CHROME_VERSION=$(google-chrome --version | grep -oE '[0-9]+' | head -1)
          echo "GitHub runner Chrome major version: $CHROME_VERSION"
          npm install --no-save chromedriver@$CHROME_VERSION

      - name: Run tests
        run: npm run ci:test
        env:
          HEADLESS: "true"

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mochawesome-report
          path: reports/
